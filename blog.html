<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>文章專區｜Aplus</title>
  <meta name="description" content="Aplus 提供虛擬攝影棚、攝影棚租借與製作相關內容文章。" />

  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/pages/blog.css" />
</head>

<body data-en-url="./en/index.html" data-blog-en-fallback="./en/index.html">

  <div id="site-header"></div>

  <main class="section-shell">
    <div class="container">

      <div class="section-heading">
        <h1 class="section-title">文章專區</h1>
        <p class="section-subtitle">
          探索虛擬攝影棚、節目製作與內容行銷相關知識
        </p>
      </div>

      <div id="blog-list" class="blog-grid"></div>

    </div>
  </main>

  <div id="site-footer"></div>

  <script src="./assets/js/layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./admin/js/supabase.js"></script>

<script>
  async function loadArticles() {
    const supabase = window.supabaseClient;
    if (!supabase) {
      throw new Error("文章未載入");
    }

    const { data, error } = await supabase
      .from("articles")
      .select("*")
      .eq("status", "published")
      .order("published_at", { ascending: false });

    if (error) throw error;

    return data || [];
  }

  function formatDate(dateString) {
    if (!dateString) return "";
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) return "";

    return date.toLocaleDateString("zh-TW", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    });
  }

  async function renderBlog() {
    const listEl = document.getElementById("blog-list");

    try {
      const articles = await loadArticles();

      if (!articles.length) {
        listEl.innerHTML = "<p>目前尚無文章</p>";
        return;
      }

      listEl.innerHTML = articles.map(article => `
        <a class="blog-card" href="./article.html?slug=${article.slug}">
          <div class="blog-card__body">
            <div class="inline-meta" style="margin-bottom:10px;">
              <span>${article.category || "文章"}</span>
              <span>${formatDate(article.published_at || article.created_at)}</span>
            </div>
            <h3>${article.title}</h3>
            <p>${article.summary || ""}</p>
            <span class="blog-card__more">閱讀更多 →</span>
          </div>
        </a>
      `).join("");
    } catch (error) {
      console.error("載入文章失敗：", error);
      listEl.innerHTML = `<p>文章載入失敗：${error.message}</p>`;
    }
  }

  renderBlog();
</script>

</body>
</html>
