<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>文章｜Aplus</title>
  <meta name="description" content="" />
  
   <link rel="stylesheet" href="./css/variables.css" />

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/pages/article.css" />
</head>

<body data-en-url="./en/index.html" data-blog-en-fallback="./en/index.html">

  <div id="site-header"></div>

  <main class="section-shell">
    <div class="container article">

      <h1 id="article-title"></h1>
      <div id="article-content" class="article-content"></div>
      
      <h3>延伸閱讀</h3>
<ul id="related-articles"></ul>

      <!-- CTA -->
      <div class="article-cta">
        <h3>需要專業攝影棚或虛擬製作方案？</h3>
        <p>歡迎留下資料，我們將提供最適合您的建議。</p>
      </div>

      <!-- 表單 -->
      <form id="lead-form" class="lead-form">
        <input type="text" name="name" placeholder="姓名" required />
        <input type="text" name="contact" placeholder="聯絡方式" required />
        <textarea name="message" placeholder="需求內容"></textarea>
        <button type="submit" class="btn btn--primary">送出詢問</button>
      </form>

    </div>
  </main>

    <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./admin/js/supabase.js"></script>
<script src="./admin/js/article-store.js"></script>
<script src="./assets/js/layout.js"></script>

<script>
  function getSlug() {
    const params = new URLSearchParams(window.location.search);
    return params.get("slug");
  }

  function getSource() {
    const params = new URLSearchParams(window.location.search);
    return params.get("source") || "direct";
  }

  async function loadArticle() {
    const supabase = window.supabaseClient;
    if (!supabase) {
      throw new Error("Supabase client 未載入");
    }

    const slug = getSlug();

    const { data, error } = await supabase
      .from("articles")
      .select("*")
      .eq("slug", slug)
      .single();

    if (error) throw error;

    return data;
  }

  function setSEO(article) {
    document.title = article.seo_title || article.title || "文章｜Aplus";

    const meta = document.querySelector("meta[name='description']");
    if (meta) {
      meta.setAttribute(
        "content",
        article.seo_description || article.summary || ""
      );
    }
  }

  async function renderArticle() {
    const titleEl = document.getElementById("article-title");
    const contentEl = document.getElementById("article-content");

    try {
      const article = await loadArticle();

      if (!article) {
        titleEl.innerText = "找不到文章";
        contentEl.innerHTML = "<p>目前找不到這篇文章內容。</p>";
        return null;
      }

      titleEl.innerText = article.title || "未命名文章";
      contentEl.innerHTML = article.content || "<p>目前尚無內容。</p>";

      setSEO(article);
      return article;
    } catch (error) {
      console.error("載入文章失敗：", error);
      titleEl.innerText = "載入失敗";
      contentEl.innerHTML = `<p>文章載入失敗：${error.message}</p>`;
      return null;
    }
  }

  async function trackPageView(article) {
    if (!article) return;

    try {
      await ArticleStore.trackEvent({
        articleId: article.id,
        eventType: "page_view",
        source: getSource()
      });
    } catch (error) {
      console.error("記錄 PV 失敗：", error);
    }
  }

  function bindForm(article) {
    const form = document.getElementById("lead-form");
    if (!form || !article) return;

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      try {
        await ArticleStore.createLead({
          name: formData.get("name"),
          contactValue: formData.get("contact"),
          message: formData.get("message"),
          sourceArticleId: article.id,
          sourceArticleTitle: article.title,
          sourceChannel: getSource()
        });

        alert("已送出，我們會盡快與您聯繫！");
        form.reset();
      } catch (error) {
        console.error("送出詢問失敗：", error);
        alert(`送出失敗：${error.message}`);
      }
    });
  }
  
  async function renderRelatedArticles(currentSlug) {
  const articles = await ArticleStore.getArticles();

  const list = articles
    .filter(a => a.slug !== currentSlug && a.status === "published")
    .slice(0, 5);

  const el = document.getElementById("related-articles");

  el.innerHTML = list.map(a => `
    <li>
      <a href="./article.html?slug=${a.slug}">
        ${a.title}
      </a>
    </li>
  `).join("");
}

  async function initArticlePage() {
    const article = await renderArticle();
    await trackPageView(article);
    await renderRelatedArticles(article.slug);
    bindForm(article);
  }

  initArticlePage();
</script>

</body>
</html>
