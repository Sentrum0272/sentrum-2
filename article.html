<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>文章｜Aplus</title>
  <meta name="description" content="" />
  
   <link rel="stylesheet" href="./css/variables.css" />

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/pages/article.css" />
</head>

<body data-en-url="./en/index.html" data-blog-en-fallback="./en/index.html">

  <div id="site-header"></div>

  <main class="section-shell">
    <div class="container article">

      <h1 id="article-title"></h1>
      <div id="article-content" class="article-content"></div>

      <!-- CTA -->
      <div class="article-cta">
        <h3>需要專業攝影棚或虛擬製作方案？</h3>
        <p>歡迎留下資料，我們將提供最適合您的建議。</p>
      </div>

      <!-- 表單 -->
      <form id="lead-form" class="lead-form">
        <input type="text" name="name" placeholder="姓名" required />
        <input type="text" name="contact" placeholder="聯絡方式" required />
        <textarea name="message" placeholder="需求內容"></textarea>
        <button type="submit" class="btn btn--primary">送出詢問</button>
      </form>

    </div>
  </main>

    <div id="site-footer"></div>

  <script src="./admin/js/article-store.js"></script>
  <script src="./assets/js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./admin/js/supabase.js"></script>

  <script>
    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug");
    }

    function getSource() {
      const params = new URLSearchParams(window.location.search);
      return params.get("source") || "direct";
    }

    async function loadArticle() {
  const slug = getSlug();

  const { data } = await supabase
    .from("articles")
    .select("*")
    .eq("slug", slug)
    .single();

  return data;
}

    function setSEO(article) {
      document.title = article.seo_title || article.title;

      const meta = document.querySelector("meta[name='description']");
      if (meta) {
        meta.setAttribute("content", article.seo_description || article.summary || "");
      }
    }

    function renderArticle() {
      const article = loadArticle();

      if (!article) {
        document.getElementById("article-title").innerText = "找不到文章";
        document.getElementById("article-content").innerHTML = "<p>目前找不到這篇文章內容。</p>";
        return null;
      }

      document.getElementById("article-title").innerText = article.title;
      document.getElementById("article-content").innerHTML = article.content;

      setSEO(article);
      return article;
    }

    function trackPageView(article) {
      if (!article) return;

      ArticleStore.trackEvent({
        articleId: article.id,
        eventType: "page_view",
        source: getSource(),
        meta: {
          slug: article.slug
        }
      });
    }

    function bindForm(article) {
      const form = document.getElementById("lead-form");
      if (!form || !article) return;

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const formData = new FormData(form);

        ArticleStore.createLead({
          name: formData.get("name"),
          contactType: "text",
          contactValue: formData.get("contact"),
          message: formData.get("message"),
          sourceArticleId: article.id,
          sourceArticleTitle: article.title,
          sourceChannel: getSource(),
          status: "new"
        });

        alert("已送出，我們會盡快與您聯繫！");
        form.reset();
      });
    }

    const article = renderArticle();
    trackPageView(article);
    bindForm(article);
  </script>

</body>
</html>
